<script>
  function listarColaboradoresCadastrados() {
    fetch("/usuarios/listarColaboradoresCadastrados")
      .then(function (res) {
        return res.json();
      })
      .then(function (usuarios) {
        var listaColaboradores = document.getElementById(
          "colaboradoresCadastrados",
        );
        if (usuarios.length == 0) {
          listaColaboradores.innerHTML = "<p> Nenhum usuario cadastrado </p>";
          return;
        }
        var tabelaColaboradoresCadastrados = "";
        for (var i = 0; i < usuarios.length; i++) {
          tabelaColaboradoresCadastrados += `
            <tr>
                <td>${usuarios[i].nome}</td>
                <td>${usuarios[i].email}</td>
                <td>${usuarios[i].tipoUsuario}</td>
                <td>${usuarios[i].setor}</td>
                <td><span class="etiqueta success">${usuarios[i].statusUsuario}</span></td>
              </tr>
          `;
        }
        listaColaboradores.innerHTML = tabelaColaboradoresCadastrados;
      });
  }

  function listarEmpresas() {
    var listaEmpresas =
      '<option value="0" selected disabled>Escolha a empresa</option>';
    var cont = 0;
    var selectEmpresa = document.getElementById("select_fk_empresa");
    fetch("/empresas/listarEmpresasCadastradas", {
      method: "GET",
    })
      .then(function (resposta) {
        resposta.json().then((empresas) => {
          empresas.forEach((empresa) => {
            cont++;
            console.log(empresa);
            listaEmpresas += `
                            <option value="${empresa.idEmpresa}">${empresa.razaoSocial}</option>
                            `;
          });
          selectEmpresa.innerHTML = listaEmpresas;
        });
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });
  }

  function cadastrarColaborador() {
    var nomeVar = input_nome.value.trim();
    var emailVar = input_email.value.trim();
    var papelVar = input_papel.value.trim();
    var equipeVar = input_equipe.value.trim();
    var cpfVar = input_cpf.value.trim();
    var dataNascimentoVar = input_dataNascimento.value.trim();
    var idEmpresaVar = select_fk_empresa.value;
    var statusVar = select_status.value;
    var senhaVar = input_senha.value;

    if (nomeVar == "" ||
    emailVar == "" ||
    papelVar == "" ||
    equipeVar == "" ||
    cpfVar == "" ||
    dataNascimentoVar == "" ||
    idEmpresaVar == "" ||
    statusVar == "" ||
    senhaVar == ""){
      mostrarErro("Por favor verifique os campos novamente e confira se todos estão preenchidos corretamente!");
    }

/*     const variaveisCadastroColaborador = [
      nomeVar,
      emailVar,
      papelVar,
      equipeVar,
      cpfVar,
      dataNascimentoVar,
      idEmpresaVar,
      statusVar,
      senhaVar,
    ];

    if (
      isNuloOuVazio(variaveisCadastroColaborador)
    ) {
      alert("Nenhum campo pode estar vazio!");
    } */
    fetch("/usuarios/cadastrarColaborador", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        nomeServer: nomeVar,
        emailServer: emailVar,
        papelServer: papelVar,
        equipeServer: equipeVar,
        cpfServer: cpfVar,
        dataNascimentoServer: dataNascimentoVar,
        idEmpresaServer: idEmpresaVar,
        statusServer: statusVar,
        senhaServer: senhaVar,
      }),
    })
      .then(function (resposta) {
        if (resposta.ok) {
          mostrarSucesso("Colaborador cadastrado com sucesso!")
          limparFormulario();
          listarColaboradoresCadastrados();
        } else {
          throw "Erro no cadastro de colaborador";
          mostrarErro("Erro ao cadastrar colaborador");
        }
      })
      .catch(function (resposta) {
        console.log(`#Erro: ${resposta}`);
      });
    return false;
  }

  function limparFormulario() {
    input_nome.value = "";
    input_email.value = "";
    input_papel.value = "";
    input_equipe.value = "";
    input_cpf.value = "";
    input_dataNascimento.value = "";
    select_fk_empresa.value = "";
    select_status.value = "";
    input_senha.value = "";
  }

  function isNuloOuVazio(listaStrings) {
    var retorno = false;
    listaStrings.forEach(
      (string) => (retorno = string == null || string == ""),
    );
    return retorno;
  }

  listarEmpresas();
</script>
