<script>
  function listarColaboradoresCadastrados(){
      fetch("/usuarios/listarColaboradoresCadastrados").then(function(res){
        return res.json();
      }).then(function(usuarios){
        var listaColaboradores = document.getElementById("colaboradoresCadastrados");
        if (usuarios.length == 0){
          listaColaboradores.innerHTML = "<p> Nenhum usuario cadastrado </p>"
          return
        }
        var tabelaColaboradoresCadastrados = "";
        for (var i = 0; i < usuarios.length; i++){
          tabelaColaboradoresCadastrados += `
            <tr>
                <td>${usuarios[i].nome}</td>
                <td>${usuarios[i].email}</td>
                <td>${usuarios[i].tipoUsuario}</td>
                <td>--</td>
                <td><span class="etiqueta success">${usuarios[i].statusUsuario}</span></td>
              </tr>
          `
        }
        listaColaboradores.innerHTML = tabelaColaboradoresCadastrados;
      })
    }
</script>
