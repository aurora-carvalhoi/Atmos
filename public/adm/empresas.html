<script>
  function listarEmpresasCadastradas() {
    fetch("/empresas/listarEmpresasCadastradas").then(function (res) {
      return res.json();
    }).then(function (empresas) {
      var listaEmpresas = document.getElementById("tabelaEmpresasCadastradas");
      if (empresas.length == 0) {
        listaEmpresas.innerHTML = "<p> Nenhuma empresa cadastrada </p>"
        return
      }
      var tabelaEmpresasCadastradas = "";
      for (var i = 0; i < empresas.length; i++) {
        tabelaEmpresasCadastradas += `
            <tr>
                <td>${empresas[i].razaoSocial}</td>
                <td>${empresas[i].nomeResponsavel}</td>
                <td>${empresas[i].cnpj}</td>
                <td>${empresas[i].telefoneCelular}<br>${empresas[i].email}</td>
                <td><span class="etiqueta success">${empresas[i].statusEmpresa}</span></td>
              </tr>
          `
      }
      listaEmpresas.innerHTML = tabelaEmpresasCadastradas;
    })
  }

  function formatarCNPJ(input) {
    let valor = input.value.replace(/\D/g, "");

    valor = valor.replace(/^(\d{2})(\d)/, "$1.$2");
    valor = valor.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
    valor = valor.replace(/\.(\d{3})(\d)/, ".$1/$2");
    valor = valor.replace(/(\d{4})(\d)/, "$1-$2");

    input.value = valor.substring(0, 18);
  }

  function formatarTelefone(input) {
    let valor = input.value.replace(/\D/g, "");

    valor = valor.replace(/^(\d{2})(\d)/g, "($1) $2");

    if (valor.length > 13) {
      valor = valor.replace(/(\d{5})(\d)/, "$1-$2");
    } else {
      valor = valor.replace(/(\d{4})(\d)/, "$1-$2");
    }

    input.value = valor.substring(0, 15);
  }

  function formatarUF(input) {
    let valor = input.value.replace(/[^a-zA-Z]/g, "");
    input.value = valor.toUpperCase().substring(0, 2);
  }

  function somenteTexto(input) {
    input.value = input.value.replace(/[^a-zA-ZÀ-ÿ\s]/g, "");
  }

 function buscarCEP() {
    var cep = input_cep.value.replace(/\D/g, "");

    if (cep.length != 8) return;

    fetch(`https://viacep.com.br/ws/${cep}/json/`)
        .then(res => res.json())
        .then(dados => {
            if (dados.erro) {
                alert("CEP não encontrado");
                return;
            }
            input_logradouro.value = dados.logradouro;
            input_bairro.value = dados.bairro;
            input_cidade.value = dados.localidade;
            input_uf.value = dados.uf;
            
            document.getElementById("input_numero").focus();
        })
        .catch(err => console.error("Erro ao buscar CEP:", err));
}

function cadastrarEmpresa() {
    const dados = {
        nome: input_nome.value,
        responsavel: input_responsavel.value,
        cnpj: input_cnpj.value.replace(/\D/g, ""),
        email: input_email.value,
        telefoneCelular: input_telefone.value.replace(/\D/g, ""),
        cep: input_cep.value.replace(/\D/g, ""),
        logradouro: input_logradouro.value,
        bairro: input_bairro.value,
        cidade: input_cidade.value,
        uf: input_uf.value,
        numero: input_numero.value,
        status: select_status.value,
        ddi: "55",
        ddd: input_telefone.value.replace(/\D/g, "").substring(0, 2)
    };

    if (!dados.nome || !dados.cnpj || !dados.cep) {
        alert("Preencha os campos essenciais!");
        return;
    }

    fetch("/empresas/cadastrar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(dados)
    })
    .then(res => {
        if (res.ok) {
            alert("Empresa cadastrada com sucesso!");
            location.reload(); 
        }
    });
}
</script>
