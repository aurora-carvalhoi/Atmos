<script>
  function listarEmpresasCadastradas(){
      fetch("/empresas/listarEmpresasCadastradas").then(function(res){
        return res.json();
      }).then(function(empresas){
        var listaEmpresas = document.getElementById("tabelaEmpresasCadastradas");
        if (empresas.length == 0){
          listaEmpresas.innerHTML = "<p> Nenhuma empresa cadastrada </p>"
          return
        }
        var tabelaEmpresasCadastradas = "";
        for (var i = 0; i < empresas.length; i++){
          tabelaEmpresasCadastradas += `
            <tr>
                <td>${empresas[i].nomeEmpresa}</td>
                <td>${empresas[i].nomeResponsavel}</td>
                <td>${empresas[i].cnpj}</td>
                <td>${empresas[i].telefoneFixo}<br>${empresas[i].email}</td>
                <td><span class="etiqueta success">${empresas[i].statusCliente}</span></td>
              </tr>
          `
        }
        listaEmpresas.innerHTML = tabelaEmpresasCadastradas;
      })
    }
</script>
