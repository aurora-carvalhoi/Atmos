<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atmos | Empresas</title>
  <link rel="icon" href="../assets/icons/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="corpo-admin" data-page="empresas">
  <div class="estrutura-admin">
    <div class="menu-lateral">
      <a class="logo-admin" href="index.html"><span class="ponto-logo"></span>ATMOS</a>
      <span class="titulo-menu">MENU</span>
      <div class="menu-nav">
        <a href="index.html"><span class="ponto-nav"></span>Home</a>
        <a href="empresas.html" class="active"><span class="ponto-nav"></span>Empresas</a>
        <a href="colaboradores.html"><span class="ponto-nav"></span>Colaboradores</a>
        <a href="servidores.html"><span class="ponto-nav"></span>Servidores</a>
      </div>
      <div class="usuario-menu">
        <div class="avatar-admin" data-admin-user-avatar>A</div>
        <div><strong data-admin-user-name>Administrador</strong><br><small data-admin-user-email>admin@atmos.com</small></div>
      </div>
    </div>

    <section class="conteudo-admin">
      <div class="topo-admin">
        <div>
          <h1>Empresas</h1>
        </div>
        <div class="acoes-admin">
          <button onclick="abrirModalEmpresa()" class="btn-admin" type="button" data-open-company-modal>Cadastrar empresa</button>
        </div>
      </div>

      <section style="margin-top:16px;" class="painel-tabela">
        <div class="cabecalho-tabela">
          <div>
            <h2>Empresas cadastradas</h2>
          </div>
        </div>
        <div id="empresasTable"></div>
      </section>
    </section>
  </div>

  <div class="fundo-modal" id="companyModal">
    <div class="card-modal">
      <div class="cabecalho-painel">
        <div>
          <h2>Cadastrar empresa</h2>
        </div>
        <button class="fechar-modal" data-close-company-modal type="button">Fechar</button>
      </div>

      <form class="card-formulario" id="empresaForm" style="padding:0; border:0; box-shadow:none;">
        <div class="grade-campos">
          <div class="campo"><label>Nome da empresa</label><input name="nome" required placeholder="Atmos Labs"></div>
          <div class="campo"><label>Responsável</label><input name="responsavel" required placeholder="Nome responsável"></div>
          <div class="campo"><label>Segmento</label><input name="segmento" required placeholder="Observabilidade"></div>
          <div class="campo"><label>CNPJ</label><input name="cnpj" required placeholder="00.000.000/0000-00"></div>
          <div class="campo"><label>E-mail</label><input type="email" name="email" required placeholder="contato@empresa.com"></div>
          <div class="campo"><label>Telefone</label><input name="telefone" required placeholder="(11) 99999-9999"></div>
          <div class="campo"><label>Cidade</label><input name="cidade" required placeholder="São Paulo"></div>
          <div class="campo"><label>UF</label><input name="uf" required maxlength="2" placeholder="SP"></div>
          <div class="campo inteiro"><label>Status</label><select name="status"><option>Operando</option><option>Implantação</option><option>Homologação</option></select></div>
        </div>
        <div class="rodape-formulario">
          <button class="btn-admin" type="submit">Salvar empresa</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-admin" id="adminToast"></div>
</body>
</html>

<script src="../assets/javascript/admin.js"></script>
