<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atmos | Home</title>
  <link rel="icon" href="../assets/icons/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="corpo-admin" data-page="home">
  <div class="estrutura-admin">
    <div class="menu-lateral">
      <a class="logo-admin" href="index.html"><span class="ponto-logo"></span>ATMOS</a>
      <span class="titulo-menu">MENU</span>
      <div class="menu-nav">
        <a href="index.html" class="active"><span class="ponto-nav"></span>Home</a>
        <a href="empresas.html"><span class="ponto-nav"></span>Empresas</a>
        <a href="colaboradores.html"><span class="ponto-nav"></span>Colaboradores</a>
        <a href="servidores.html"><span class="ponto-nav"></span>Servidores</a>
      </div>
      <div class="usuario-menu">
        <div class="avatar-admin" data-admin-user-avatar>A</div>
        <div>
          <strong data-admin-user-name>Administrador</strong><br>
          <small data-admin-user-email>admin@atmos.com</small>
        </div>
      </div>
    </div>

    <section class="conteudo-admin">
      <div class="topo-admin">
        <div><h1>Home</h1></div>
        <div class="acoes-admin">
          <a class="btn-admin" href="empresas.html">Cadastrar empresa</a>
        </div>
      </div>

      <section class="grade-indicadores">
        <div class="card-indicador">
          <div class="rotulo-indicador">Empresas</div>
          <div class="valor-indicador" id="kpiEmpresas">00</div>
          <div class="meta-indicador">Cadastradas</div>
        </div>
        <div class="card-indicador">
          <div class="rotulo-indicador">Colaboradores</div>
          <div class="valor-indicador" id="kpiColaboradores">00</div>
          <div class="meta-indicador">Ativos</div>
        </div>
        <div class="card-indicador">
          <div class="rotulo-indicador">Servidores</div>
          <div class="valor-indicador" id="kpiServidores">00</div>
          <div class="meta-indicador">Ativos</div>
        </div>
      </section>

      <section class="grade-cards">
        <div class="painel">
          <div class="cabecalho-secao">
            <div><h2>Acesso rápido</h2></div>
          </div>
          <div class="lista-atalhos">
            <a class="link-atalho" href="empresas.html"><span>Cadastrar empresa</span><strong>→</strong></a>
            <a class="link-atalho" href="colaboradores.html"><span>Cadastrar colaborador</span><strong>→</strong></a>
            <a class="link-atalho" href="servidores.html"><span>Cadastrar servidor</span><strong>→</strong></a>
          </div>
        </div>
        <div class="painel-tabela">
          <div class="cabecalho-tabela">
            <div><h2>Empresas recentes</h2></div>
          </div>
          <div id="overviewEmpresas"></div>
        </div>
      </section>

      <section class="painel-tabela" style="margin-top: 14px;">
        <div class="cabecalho-tabela">
          <div><h2>Servidores recentes</h2></div>
        </div>
        <div id="overviewInfra"></div>
      </section>
    </section>
  </div>

  <div class="toast-admin" id="adminToast"></div>
</body>
</html>

<script src="../assets/javascript/admin.js"></script>
