<script>
  function listarServidoresCadastrados() {
    fetch("/servidores/listarServidoresCadastrados").then(function (res) {
      return res.json();
    }).then(function (servidores) {
      var listaServidores = document.getElementById("servidoresCadastrados");
      if (servidores.length == 0) {
        listaServidores.innerHTML = "<p> Nenhum servidor cadastrado </p>"
        return
      }
      var tabelaServidoresCadastrados = "";
      for (var i = 0; i < servidores.length; i++) {
        tabelaServidoresCadastrados += `
            <tr>
                <td>${servidores[i].nomeIdentificacao}</td>
                <td>${servidores[i].enderecoIPV4}</td>
                <td>${servidores[i].sistemaOperacional}</td>
                <td>${servidores[i].razaoSocial}</td>
                <td><span class="etiqueta success">${servidores[i].statusServidor}</span></td>
              </tr>
          `
      }
      listaServidores.innerHTML = tabelaServidoresCadastrados;
    })
  }

  function listarEmpresas() {
    var listaEmpresas =
      '<option value="0" selected disabled>Escolha a empresa</option>';
    var cont = 0;
    var selectEmpresa = document.getElementById("select_fk_empresa");
    fetch("/empresas/listarEmpresasCadastradas", {
      method: "GET",
    })
      .then(function (resposta) {
        resposta.json().then((empresas) => {
          empresas.forEach((empresa) => {
            cont++;
            console.log(empresa);
            listaEmpresas += `
                            <option value="${empresa.idEmpresa}">${empresa.razaoSocial}</option>
                            `;
          });
          selectEmpresa.innerHTML = listaEmpresas;
        });
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });
  }

  function cadastrarServidor() {
    var servidorNomeVar = servidorNome.value.trim()
    var servidorIdentificacaoVar = servidorIdentificacao.value.trim()
    var servidorIpVar = servidorIp.value.trim()
    var servidorSoVar = servidorSo.value.trim()
    var idEmpresaVar = select_fk_empresa.value;
    var servidorStatusVar = servidorStatus.value

    const variaveisCadastroServidor = [
      servidorNomeVar,
      servidorIdentificacaoVar,
      servidorIpVar,
      servidorSoVar,
      idEmpresaVar,
      servidorStatusVar
    ]

    if (isNuloOuVazio(variaveisCadastroServidor)) {
      alert("Nenhum campo pode estar vazio!");
    }

    fetch("/servidores/cadastrarServidor", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        servidorNome: servidorNomeVar,
        servidorIdentificacao: servidorIdentificacaoVar,
        servidorIp: servidorIpVar,
        servidorSo: servidorSoVar,
        idEmpresaServer: idEmpresaVar,
        servidorStatus: servidorStatusVar
      })
    })
      .then(function (resposta) {
        if (resposta.ok) {
          limparFormulario();
          listarServidoresCadastrados();
          alert("Servidor cadastrado com sucesso!")
        } else {
          throw "Erro de cadastro de servidor";
          alert("Erro ao cadastrar servidor!")
        }
      })
      .catch(function (resposta) {
        console.log(`#Erro: ${resposta}`);
      })
    return false;
  }

  function isNuloOuVazio(listaStrings) {
    var retorno = false;
    listaStrings.forEach(
      (string) => (retorno = string == null || string == ""),
    );
    return retorno;
  }

  function limparFormulario() {
    servidorNome.value = "";
    servidorIdentificacao.value = "";
    servidorIp.value = "";
    servidorSo.value = "";
    select_fk_empresa.value = "";
    servidorStatus.value = "";
  }
</script>
