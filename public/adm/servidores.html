    <main class="conteudo-admin">
      <div class="topo-admin">
        <div>
          <h1>Servidores</h1>

      <section class="grade-dividida">
        <form class="card-formulario">
          <h3>Cadastrar servidor</h3>
          <div class="grade-campos" style="margin-top:14px;">
            <div class="campo"><label>Nome do host</label><input name="nome" required></div>
            <div class="campo"><label>Identificação</label><input name="identificacao" required></div>
            <div class="campo"><label>IP</label><input name="ip" required></div>
            <div class="campo"><label>Sistema operacional</label><input name="so" required></div>
            <div class="campo"><label>Empresa</label><select name="empresa" required><option>Atmos Monitoring Systems</option><option>Cloud Aurora</option><option>Sky Pulse</option></select></div>
            <div class="campo"><label>Status</label><select name="status"><option>Estável</option><option>Observação</option><option>Crítico</option><option>Implantação</option></select></div>
            <div class="campo inteiro"><label>Observações</label><textarea name="observacoes" placeholder="Opcional"></textarea></div>
          </div>
          <div class="rodape-formulario">
            <button type="button" class="btn-admin">Salvar servidor</button>
          </div>
        </form>
      </section>

      <section style="margin-top:16px;" class="painel-tabela">
        <div class="cabecalho-tabela">
          <div>
            <h2>Servidores cadastrados</h2>
          </div>
        </div>
        <div class="envolve-tabela">
          <table class="tabela-admin">
            <thead>
              <tr>
                <th>Servidor</th>
                <th>IP</th>
                <th>Sistema</th>
                <th>Empresa</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="servidoresCadastrados">
              <!-- <tr>
                <td>srv-api-clima-01</td>
                <td>10.20.5.14</td>
                <td>Ubuntu 24.04</td>

                <td><span class="etiqueta info">Estável</span></td>
              </tr>
              <tr>

                <td>10.20.5.21</td>

                <td><span class="etiqueta info">Observação</span></td>
              </tr>
              <tr>

      </section>
    </main>
  </div>

  <script src="../assets/javascript/admin.js"></script>
</body>
</html>
<script>
  function listarServidoresCadastrados(){
      fetch("/servidores/listarServidoresCadastrados").then(function(res){
        return res.json();
      }).then(function(servidores){
        var listaServidores = document.getElementById("servidoresCadastrados");
        if (servidores.length == 0){
          listaServidores.innerHTML = "<p> Nenhum servidor cadastrado </p>"
          return
        }
        var tabelaServidoresCadastrados = "";
        for (var i = 0; i < servidores.length; i++){
          tabelaServidoresCadastrados += `
            <tr>
                <td>${servidores[i].nome}</td>
                <td>${servidores[i].enderecoIP}</td>
                <td>${servidores[i].sistemaOperacional}</td>
                <td>${servidores[i].nomeEmpresa}</td>
                <td><span class="etiqueta success">--</span></td>
              </tr>
          `
        }
        listaServidores.innerHTML = tabelaServidoresCadastrados;
      })
    }
</script>
