<script>
    function entrar() {
    

        var emailVar = inputemail.value;
        var codigoVar = input_codigo.value;

        if (emailVar == "" || codigoVar == "") {
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            return;
        }
        

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", codigoVar);
        console.log("TO AQUI");
      
        fetch("/usuarios/cadastrar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                codigoServer: codigoVar
     
            })
        })
        .then(resposta => {
            console.log("ESTOU NO THEN DO entrar()!")
            console.log(resposta)
            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then((json) => {
                    console.log(json);
                console.log("ur ur");

                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.ID_USUARIO = json.id;
                    sessionStorage.FKEMPRESA = json.fkEmpresa;
                    window.location = "./finalizarcadastro.html";

                    setTimeout(function () {
                       // window.location = "./cadastro_funcionario.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })
    }
