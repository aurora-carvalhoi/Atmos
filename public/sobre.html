            rel="stylesheet" />

<body>
<style>
    .menu-icon {
        width: 30px;
        height: 25px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .menu-icon span {
        height: 3px;
        width: 100%;
        background-color: black;
        transition: all 0.3s ease; /* Faz o movimento ser suave */
    }

    /* Estado de "X" quando a classe 'open' for adicionada */
    .menu-icon.open span:nth-child(1) {
        transform: translateY(11px) rotate(45deg);
    }

    .menu-icon.open span:nth-child(2) {
        opacity: 0; /* Esconde a linha do meio */
    }

    .menu-icon.open span:nth-child(3) {
        transform: translateY(-11px) rotate(-45deg);
    }
</style>

    <div class="container">
        <div class="menu-icon" onclick="toggleMenu(this)">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

<script>
    function toggleMenu(x) {
        x.classList.toggle("open");
    }
</script>
</body>
</html>
