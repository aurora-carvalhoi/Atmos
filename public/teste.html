<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<div class=" carrossel">
    <div class="slides">
        <img src="imagens/img1.jpg" alt="Carrossel HTML CSS Imagem 1">
        <img src="imagens/img2.jpg" alt="Carrossel HTML CSS Imagem 2">
        <img src="imagens/img3.jpg" alt="Carrossel HTML CSS Imagem 3">
    </div>
    <button class="esquerda">&#10094;</button>
    <button class="direita">&#10095;</button>
    </div>, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

</body>

</html>
<script>
    const slides = document.querySelector('.slides');
    const imagens = document.querySelectorAll('.slides img');
    const btnEsq = document.querySelector('.esquerda');
    const btnDir = document.querySelector('.direita');

    let index = 0;

    function mostrarSlide() {
        slides.style.transform = `translateX(${-index * 100}%)`;
    }

    btnDir.addEventListener('click', () => {
        index = (index + 1) % imagens.length;
        mostrarSlide();
    });

    btnEsq.addEventListener('click', () => {
        index = (index - 1 + imagens.length) % imagens.length;
        mostrarSlide();
    });

    setInterval(() => {
        index = (index + 1) % imagens.length;
        mostrarSlide();
    }, 3000);
</script>
