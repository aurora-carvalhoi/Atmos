            <p><span class="check">✔</span><span id="span_caracEsp" style="color: black;"> Caracteres especiais</span>
            </p>

<script>

    var senhaValida = false;

    function validarSenha() {
        senha = input_senha.value;

        var veriTam = false;
        var veriNum = false;
        var veriCarc = false;



        // tamanho
        if (senha.length >= 8) {
            span_tamanho.style.color = "#004aad";
            veriTam = true;
        } else {
            span_tamanho.style.color = "red";
            veriTam = false;
        }

        if (senha.includes(0) || senha.includes(1) || senha.includes(2) || senha.includes(3) ||
            senha.includes(4) || senha.includes(5) || senha.includes(6) ||
            senha.includes(7) || senha.includes(8) || senha.includes(9)) {

            span_num.style.color = "#004aad";
            veriNum = true;

        } else {
            span_num.style.color = "red";
            veriNum = false;
        }

        if (senha.includes('!') || senha.includes('%') || senha.includes('*') || senha.includes('.') ||
            senha.includes('&') || senha.includes('#') || senha.includes('$')) {

            span_caracEsp.style.color = "#004aad";
            veriCarc = true;

        } else {
            span_caracEsp.style.color = "red";
            veriCarc = false;
        }

        if (veriTam == false || veriNum == false || veriCarc == false) {
            senhaValida = false;
        } else {
            senhaValida = true;
        }
    }

    function entrar() {


        var nomeVar = input_nome.value;
        var senhaVar = input_senha.value;
        var senhaconfVar = input_senhaconfirmacao.value
        var idUsuarioVar = sessionStorage.ID_USUARIO

        if (nomeVar == "" || senhaVar == "" || senhaconfVar == "") {
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            return;
        }

        else if (!senhaValida) {
            cardErro.style.display = "block";
            mensagem_erro.innerHTML = "A senha não atende aos requisitos.";
            return false;
        }

        else if (senhaVar != senhaconfVar) {
            cardErro.style.display = "block";
            mensagem_erro.innerHTML = "A confirmação da senha está diferente.";
            return false;
        }




        console.log("FORM NOME: ", nomeVar);
        console.log("FORM SENHA: ", senhaVar);
        console.log("TO AQUI");

        fetch("/usuarios/finalizarCadastro", {
            method: "PATCH",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                nomeServer: nomeVar,
                senhaServer: senhaVar,
                idServer: idUsuarioVar
            })
        })
            .then(resposta => {
                console.log("ESTOU NO THEN DO entrar()!")
                console.log(resposta)
                if (resposta.ok) {
                    console.log(resposta);

                    resposta.json().then((json) => {
                        console.log(json);
                        console.log("ur ur");

                        console.log(JSON.stringify(json));
                        window.location = "./login.html";

                        setTimeout(function () {
                        }, 1000);

                    });

                } else {

                    console.log("Houve um erro ao tentar realizar o login!");

                    resposta.text().then(texto => {
                        console.error(texto);
                        finalizarAguardar(texto);
                    });
                }

            }).catch(function (erro) {
                console.log(erro);
            })
    }
