<body>

    <!--Container login-->
    <div class="container-login">
        <div class="login-info">
            <div class="logo-login">
                <a href="./index.html">
                    <img src="./assets/images/logo-atmos-alternative.svg" alt="Logo Atmos" />
                </a>
            </div>
            <div class="texto-info">
                <h1>Acesso ao Painel de Controle</h1>
                <p>Monitore sua infraestrutura meteorológica e gerencie chaves
                    de API com segurança de nível industrial.</p>
            </div>
        </div>


        <div class="login-input">

            <div class="h1-login">
                <h1>Login do Operador</h1>
                <p>Insira suas credenciais para autenticar</p>
            </div>


            <div class="paragrafo-login">
                <label for="input_email">EMAIL</label>
                <input type="text" id="inputemail" placeholder="email@empresa.com">
                <label>SENHA</label>
                <input type="password" id="input_senha" placeholder="*******">
            </div>

            <div class="bloco-input">
                <div class="buttons">
                    <button onclick="entrar()">
                        Entrar
                    </button>
                </div>
                <span>
                    Ainda não é cadastrado?
                    <a href="./cadastro.html"> Clique aqui.</a>
                </span>
            </div>
        </div>

    </div>
</body>

</html>

<script>
    function entrar() {
        var emailVar = inputemail.value;
        var senhaVar = input_senha.value;

        if (emailVar == "" || senhaVar == "") {
            // cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            //finalizarAguardar();
            return;
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);
        console.log("TO AQUI");

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar

            })
        })
            .then(resposta => {
                console.log("ESTOU NO THEN DO entrar()!")
                console.log(resposta)
                if (resposta.ok) {
                    console.log(resposta);

                    resposta.json().then((json) => {
                        console.log(json);

                        console.log(JSON.stringify(json));
                        sessionStorage.EMAIL_USUARIO = json.email;
                        sessionStorage.NOME_USUARIO = json.nome;
                        sessionStorage.ID_USUARIO = json.id;
                        sessionStorage.FKEMPRESA = json.fkEmpresa;
                        sessionStorage.STATUS_USUARIO = json.statusUsuario;
                        sessionStorage.TIPO_USUARIO = json.tipoUsuario;
                        if (json.tipoUsuario == 'Gestor') {
                            setTimeout(function () {
                                window.location = "./dashboard/dashboardAtmosGerente.html";
                            }, 1000); 
                        } else {
                            setTimeout(function () {
                                window.location = "./dashboard/dashboardAtmos.html";
                            }, 1000); // apenas para exibir o loading
                        }

                    });

                } else {
                    mostrarErro("Erro ao realizar login! Verifique suas credencias");
                    console.log("Houve um erro ao tentar realizar o login!");
                    resposta.text().then(texto => {
                        console.error(texto);
                        finalizarAguardar(texto);
                    });
                }

            }).catch(function (erro) {
                console.log(erro);
            })
    }

        //  cardErro.style.display = "none"
    }

</script>
